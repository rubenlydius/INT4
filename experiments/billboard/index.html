<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>View-Master</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            font-family: sans-serif;
        }

        #image-wrap {
            margin-top: 40px;
            display: flex;
            justify-content: center;
        }

        #billboard {
            width: 80vw;
            max-width: 600px;
            display: block;
            transform-origin: center center;
            transform: rotate(0deg);
        }

        #name-display {
            margin-top: 20px;
            font-size: 1.2rem;
            letter-spacing: 0.05em;
            text-align: center;
            min-height: 1.5em;
            transition: opacity 0.2s;
        }

        /* ── Eye button ── */
        #eye-btn {
            position: fixed;
            bottom: 24px;
            right: 24px;
            background: none;
            border: none;
            cursor: pointer;
            opacity: 0.35;
            transition: opacity 0.2s;
            padding: 4px;
        }

        #eye-btn:hover {
            opacity: 0.8;
        }

        /* ── Panel ── */
        #panel {
            display: none;
            position: fixed;
            bottom: 64px;
            right: 24px;
            background: white;
            border: 1px solid #ccc;
            padding: 16px;
            min-width: 220px;
            font-size: 13px;
            line-height: 2;
        }

        #panel.open {
            display: block;
        }

        #panel label {
            display: block;
        }

        #panel input[type="range"] {
            width: 100%;
        }

        #panel button {
            margin-top: 8px;
            width: 100%;
            padding: 6px;
            cursor: pointer;
        }
    </style>
</head>

<body>

    <div id="image-wrap">
        <img id="billboard" src="billboard.png" alt="billboard">
    </div>

    <div id="name-display">Ann Demeulemeester</div>

    <!-- Eye icon -->
    <button id="eye-btn" title="Settings" aria-label="Open settings">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="black" stroke-width="1.5"
            stroke-linecap="round" stroke-linejoin="round">
            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
            <circle cx="12" cy="12" r="3" />
        </svg>
    </button>

    <!-- Panel -->
    <div id="panel">
        <strong>Debug</strong><br>
        Raw: <span id="raw">0</span><br>
        State: <span id="state">IDLE</span><br>
        <br>
        <label>Trigger at: <span id="cal-trigger-val">2000</span>
            <input type="range" id="cal-trigger" min="0" max="4095" value="2000">
        </label>
        <button id="connect-btn">Connect ESP32</button>
    </div>

    <script>
        const connectBtn = document.getElementById('connect-btn');
        const rawEl = document.getElementById('raw');
        const stateEl = document.getElementById('state');
        const billboard = document.getElementById('billboard');
        const nameDisplay = document.getElementById('name-display');
        const calTrigger = document.getElementById('cal-trigger');
        const calTriggerVal = document.getElementById('cal-trigger-val');
        const eyeBtn = document.getElementById('eye-btn');
        const panel = document.getElementById('panel');

        const NAMES = [
            'Ann Demeulemeester',
            'Dirk Bikkembergs',
            'Marina Yee',
            'Dirk Van Saene',
            'Dries Van Noten',
            'Walter Van Beirendonck',
        ];

        let TRIGGER = 2000;
        let totalDeg = 0;
        let currentSide = 0;
        let isAnimating = false;
        let lastAdvance = 0;
        const COOLDOWN = 1000;
        let aboveThreshold = false;

        // Eye toggle
        eyeBtn.addEventListener('click', () => panel.classList.toggle('open'));

        calTrigger.addEventListener('input', () => {
            TRIGGER = +calTrigger.value;
            calTriggerVal.textContent = TRIGGER;
        });

        connectBtn.addEventListener('click', async () => {
            const port = await navigator.serial.requestPort();
            await port.open({ baudRate: 115200 });
            connectBtn.disabled = true;
            connectBtn.textContent = 'Connected';

            const decoder = new TextDecoderStream();
            port.readable.pipeTo(decoder.writable);
            const reader = decoder.readable.getReader();
            let buffer = '';

            while (true) {
                const { value, done } = await reader.read();
                if (done) break;
                buffer += value;
                const lines = buffer.split('\n');
                buffer = lines.pop();
                for (const line of lines) {
                    const val = parseInt(line.trim(), 10);
                    if (!isNaN(val)) process(val);
                }
            }
        });

        function process(raw) {
            rawEl.textContent = raw;
            if (isAnimating) return;

            if (raw >= TRIGGER) {
                if (!aboveThreshold) {
                    aboveThreshold = true;
                    const now = Date.now();
                    if (now - lastAdvance >= COOLDOWN) {
                        lastAdvance = now;
                        advance();
                    }
                }
                stateEl.textContent = 'TRIGGER';
            } else {
                aboveThreshold = false;
                stateEl.textContent = 'IDLE';
            }
        }

        function advance() {
            isAnimating = true;
            totalDeg += 60;
            currentSide = (currentSide + 1) % 6;

            billboard.style.transition = 'transform 0.4s cubic-bezier(0.4, 0, 0.2, 1)';
            billboard.style.transform = `rotate(${totalDeg}deg)`;

            // fade name out, swap, fade back in
            nameDisplay.style.opacity = '0';
            setTimeout(() => {
                nameDisplay.textContent = NAMES[currentSide];
                nameDisplay.style.opacity = '1';
            }, 200);

            setTimeout(() => {
                isAnimating = false;
            }, 400);
        }
    </script>
</body>

</html>
