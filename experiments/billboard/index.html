<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>View-Master</title>
</head>

<body>

    <button id="connect-btn">Connect ESP32</button>
    <p>Raw: <span id="raw">0</span></p>
    <p>State: <span id="state">IDLE</span></p>

    <br>

    <svg width="200" height="200" viewBox="-100 -100 200 200">
        <g id="hex-group" transform="rotate(0)">
            <!-- pointy-top hexagon centered at 0,0 with radius 90 -->
            <polygon points="0,-90 77.9,-45 77.9,45 0,90 -77.9,45 -77.9,-45" fill="black" />
        </g>
    </svg>

    <br>

    <label>Rotate start: <input type="range" id="cal-rotate" min="0" max="4095" value="800"> <span
            id="cal-rotate-val">800</span></label><br>
    <label>Trigger at: &nbsp;&nbsp;<input type="range" id="cal-trigger" min="0" max="4095" value="3200"> <span
            id="cal-trigger-val">3200</span></label>

    <script>
        const connectBtn = document.getElementById('connect-btn');
        const rawEl = document.getElementById('raw');
        const stateEl = document.getElementById('state');
        const hexGroup = document.getElementById('hex-group');

        const calRotate = document.getElementById('cal-rotate');
        const calTrigger = document.getElementById('cal-trigger');
        const calRotateVal = document.getElementById('cal-rotate-val');
        const calTriggerVal = document.getElementById('cal-trigger-val');

        let ROTATE_START = 800;
        let TRIGGER = 3200;
        let side = 0;
        let isAnimating = false;
        let wasTriggered = false;

        calRotate.addEventListener('input', () => {
            ROTATE_START = +calRotate.value;
            calRotateVal.textContent = ROTATE_START;
        });
        calTrigger.addEventListener('input', () => {
            TRIGGER = +calTrigger.value;
            calTriggerVal.textContent = TRIGGER;
        });

        connectBtn.addEventListener('click', async () => {
            const port = await navigator.serial.requestPort();
            await port.open({ baudRate: 115200 });
            connectBtn.disabled = true;
            connectBtn.textContent = 'Connected';

            const decoder = new TextDecoderStream();
            port.readable.pipeTo(decoder.writable);
            const reader = decoder.readable.getReader();
            let buffer = '';

            while (true) {
                const { value, done } = await reader.read();
                if (done) break;
                buffer += value;
                const lines = buffer.split('\n');
                buffer = lines.pop();
                for (const line of lines) {
                    const val = parseInt(line.trim(), 10);
                    if (!isNaN(val)) process(val);
                }
            }
        });

        function setRotation(deg) {
            hexGroup.setAttribute('transform', `rotate(${deg})`);
        }

        function process(raw) {
            rawEl.textContent = raw;
            if (isAnimating) return;

            const base = side * 60;

            if (raw >= TRIGGER) {
                if (!wasTriggered) {
                    wasTriggered = true;
                    advance();
                }
                stateEl.textContent = 'TRIGGER';

            } else if (raw > ROTATE_START) {
                wasTriggered = false;
                const pct = (raw - ROTATE_START) / (TRIGGER - ROTATE_START);
                const lean = pct * 10;
                setRotation(base + lean);
                stateEl.textContent = 'ROTATING';

            } else {
                wasTriggered = false;
                setRotation(base);
                stateEl.textContent = 'IDLE';
            }
        }

        function advance() {
            isAnimating = true;
            side = (side + 1) % 6;

            hexGroup.style.transition = 'transform 0.15s ease-out';
            setRotation(side * 60);

            setTimeout(() => {
                hexGroup.style.transition = '';
                isAnimating = false;
            }, 150);
        }
    </script>
</body>

</html>
